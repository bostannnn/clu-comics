<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - CLU</title>
  {% set theme = bootstrap_theme|default('default') %}
  {% if theme and theme != 'default' %}
  <link href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.8/dist/{{ theme }}/bootstrap.min.css" rel="stylesheet">
  {% else %}
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  {% endif %}
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="icon" type="image/png" href="/static/images/clu.png">
</head>
<body class="bg-body-tertiary d-flex align-items-center" style="min-height: 100vh;">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-sm-8 col-md-6 col-lg-4">
        <div class="card shadow-sm">
          <div class="card-body p-4">
            <div class="text-center mb-4">
              <img src="/static/images/clu.png" alt="CLU Logo" width="64" class="mb-2">
              <h4 class="mb-0">CLU</h4>
              <small class="text-muted">Comic Library Utilities</small>
            </div>

            {% if error %}
            <div class="alert alert-danger py-2" role="alert">
              <i class="bi bi-exclamation-triangle-fill me-1"></i>{{ error }}
            </div>
            {% endif %}

            <form method="post">
              <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <input type="text" class="form-control" id="username" name="username" autocomplete="username" required autofocus>
              </div>
              <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password" name="password" autocomplete="current-password" required>
              </div>
              <button type="submit" class="btn btn-primary w-100">
                <i class="bi bi-box-arrow-in-right me-1"></i>Sign In
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
